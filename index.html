<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Turma Connect</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700;800;900&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0e0e0f;
      --bg2: #161618;
      --bg3: #1c1c1f;
      --bg4: #242428;
      --border: rgba(255,255,255,0.07);
      --border-h: rgba(255,255,255,0.14);
      --accent: #ff4757;
      --accent2: #ff6b81;
      --accent-dim: rgba(255,71,87,0.12);
      --accent-glow: rgba(255,71,87,0.25);
      --text: #f0f0f2;
      --text2: #a0a0aa;
      --text3: #606068;
      --green: #2ed573;
      --yellow: #ffa502;
      --blue: #3b82f6;
      --r: 12px;
      --r-lg: 16px;
      --r-xl: 20px;
    }

    html, body { height: 100%; font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); overflow-x: hidden; -webkit-font-smoothing: antialiased; }

    #bg-canvas { position: fixed; inset: 0; width: 100%; height: 100%; z-index: 0; pointer-events: none; }
    #page-auth, #page-dashboard { position: relative; z-index: 1; }

    .hidden { display: none !important; }

    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--bg4); border-radius: 4px; }

    /* SVG icon helper */
    .icon { display: inline-flex; align-items: center; justify-content: center; flex-shrink: 0; }
    .icon svg { display: block; }

    .input {
      width: 100%; padding: 13px 16px;
      background: var(--bg3); border: 1px solid var(--border);
      border-radius: var(--r); color: var(--text); font-family: 'DM Sans', sans-serif;
      font-size: 14px; outline: none; margin-bottom: 12px;
      transition: border-color 0.2s, background 0.2s;
    }
    .input:focus { border-color: var(--accent); background: var(--bg4); }
    .input::placeholder { color: var(--text3); }
    textarea.input { resize: vertical; min-height: 88px; }

    .btn {
      padding: 13px 20px; border: none; border-radius: var(--r);
      font-family: 'DM Sans', sans-serif; font-size: 14px; font-weight: 700;
      cursor: pointer; letter-spacing: 0.2px; transition: all 0.18s ease;
      position: relative; overflow: hidden; display: inline-flex; align-items: center; justify-content: center; gap: 6px;
    }
    .btn:active { transform: scale(0.96); }
    .btn-primary { background: var(--accent); color: #fff; box-shadow: 0 4px 20px var(--accent-glow); }
    .btn-primary:hover { background: var(--accent2); box-shadow: 0 6px 28px var(--accent-glow); transform: translateY(-1px); }
    .btn-ghost { background: var(--bg3); border: 1px solid var(--border); color: var(--text2); }
    .btn-ghost:hover { border-color: var(--border-h); color: var(--text); background: var(--bg4); }
    .btn-danger { background: transparent; border: 1px solid rgba(255,71,87,0.3); color: var(--accent); }
    .btn-danger:hover { background: var(--accent-dim); }
    .btn-sm { padding: 7px 12px; font-size: 12px; border-radius: 8px; }
    .btn-full { width: 100%; }
    .label { font-size: 11px; color: var(--text3); font-weight: 700; margin-bottom: 8px; display: block; letter-spacing: 0.8px; text-transform: uppercase; }

    #toast {
      position: fixed; bottom: 90px; left: 50%;
      transform: translateX(-50%) translateY(20px);
      background: var(--bg3); border: 1px solid var(--border-h);
      color: var(--text); padding: 11px 22px; border-radius: 999px;
      font-size: 13px; font-weight: 600; z-index: 9999;
      transition: transform 0.3s cubic-bezier(.34,1.56,.64,1), opacity 0.25s;
      white-space: nowrap; opacity: 0; box-shadow: 0 8px 32px rgba(0,0,0,0.5);
      display: flex; align-items: center; gap: 8px;
    }
    #toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }

    .modal-overlay {
      position: fixed; inset: 0; background: rgba(0,0,0,0.75);
      backdrop-filter: blur(8px); z-index: 100;
      display: flex; align-items: flex-end; justify-content: center;
      animation: fadeBg .2s ease;
    }
    .modal {
      width: 100%; max-width: 520px; padding: 28px 24px 36px;
      background: var(--bg2); border: 1px solid var(--border);
      border-radius: var(--r-xl) var(--r-xl) 0 0;
      animation: sheetUp .35s cubic-bezier(.34,1.2,.64,1);
    }
    .modal-handle { width: 36px; height: 4px; background: var(--bg4); border-radius: 2px; margin: 0 auto 24px; }
    .modal-title { font-size: 18px; font-weight: 800; margin-bottom: 20px; display: flex; align-items: center; gap: 8px; }
    @keyframes fadeBg { from{opacity:0;} to{opacity:1;} }
    @keyframes sheetUp { from{transform:translateY(100%);} to{transform:translateY(0);} }

    /* AUTH */
    #page-auth {
      min-height: 100vh; display: flex; flex-direction: column;
      align-items: center; justify-content: center; padding: 24px;
      position: relative; z-index: 3;
    }
    #page-auth::before {
      content: ''; position: fixed; inset: 0;
      background: radial-gradient(ellipse 60% 40% at 50% 0%, rgba(255,71,87,0.12) 0%, transparent 70%);
      pointer-events: none;
    }

    .auth-brand { text-align: center; margin-bottom: 48px; }
    .auth-logo-box {
      width: 64px; height: 64px; background: var(--accent); border-radius: 18px;
      display: flex; align-items: center; justify-content: center;
      margin: 0 auto 16px;
      box-shadow: 0 8px 32px var(--accent-glow);
      animation: logoBreath 3s ease-in-out infinite;
    }
    @keyframes logoBreath {
      0%,100%{box-shadow:0 8px 32px var(--accent-glow);}
      50%{box-shadow:0 12px 48px rgba(255,71,87,0.45);}
    }
    .auth-brand h1 { font-size: 26px; font-weight: 900; letter-spacing: -0.5px; }
    .auth-brand p { font-size: 13px; color: var(--text3); margin-top: 4px; }

    .auth-card {
      width: 100%; max-width: 380px;
      background: var(--bg2); border: 1px solid var(--border);
      border-radius: var(--r-xl); padding: 28px 24px;
      animation: cardIn .5s cubic-bezier(.34,1.2,.64,1) both;
    }
    @keyframes cardIn { from{opacity:0;transform:translateY(24px) scale(.97);} to{opacity:1;transform:none;} }

    .auth-tabs { display: flex; background: var(--bg3); border-radius: var(--r); padding: 4px; margin-bottom: 24px; gap: 4px; }
    .auth-tab {
      flex: 1; padding: 9px; border: none; border-radius: 8px;
      background: transparent; color: var(--text3); font-family: 'DM Sans', sans-serif;
      font-size: 13px; font-weight: 700; cursor: pointer; transition: all .2s;
    }
    .auth-tab.active { background: var(--accent); color: #fff; box-shadow: 0 2px 12px var(--accent-glow); }

    .auth-form-panel { display: none; flex-direction: column; }
    .auth-form-panel.active { display: flex; animation: panelIn .3s ease both; }
    @keyframes panelIn { from{opacity:0;transform:translateX(12px);} to{opacity:1;transform:none;} }
    .auth-footer { text-align: center; margin-top: 18px; font-size: 11px; color: var(--text3); display: flex; align-items: center; justify-content: center; gap: 5px; }

    /* DASHBOARD */
    #page-dashboard { min-height: 100vh; max-width: 560px; margin: 0 auto; padding: 0 16px 96px; position: relative; z-index: 3; }
    #page-dashboard::before {
      content: ''; position: fixed; inset: 0;
      background: radial-gradient(ellipse 50% 30% at 50% 0%, rgba(255,71,87,0.08) 0%, transparent 60%);
      pointer-events: none; z-index: 0;
    }

.topbar {
  display: flex;
  align-items: center;
  justify-content: space-between;

  padding: 20px 24px 18px;
  margin-bottom: 20px;
  gap: 12px;

  border-bottom: 1px solid var(--border);

  position: fixed;
  top: 0;
  left: 0;
  width: 100%;

  z-index: 999;

  backdrop-filter: blur(16px);
  background: rgba(10, 10, 15, 0.15);
}

.topbar-left {
  display: flex;
  align-items: center;
  gap: 12px;
}

.topbar-avatar {
  width: 40px;
  height: 40px;
  border-radius: 12px;

  background: var(--accent);

  display: flex;
  align-items: center;
  justify-content: center;

  font-size: 16px;
  font-weight: 900;
  color: #fff;

  flex-shrink: 0;

  cursor: default;
  transition: transform .2s;
}

.topbar-avatar:hover {
  transform: scale(1.08) rotate(-4deg);
}

.topbar-name {
  font-size: 15px;
  font-weight: 800;
}

.topbar-role {
  font-size: 11px;
  color: var(--text3);
  font-weight: 500;
  margin-top: 1px;
}

.logout-btn {
  background: var(--bg3);
  border: 1px solid var(--border);
  color: var(--text3);

  padding: 8px 14px;
  border-radius: 10px;

  cursor: pointer;
  font-size: 12px;
  font-family: 'DM Sans', sans-serif;
  font-weight: 700;

  transition: all .2s;

  display: flex;
  align-items: center;
  gap: 6px;
}

.logout-btn:hover {
  border-color: var(--border-h);
  color: var(--text);
}

body {
  padding-top: 90px;
}
    .hero-greeting { margin-bottom: 24px; }
    .hero-greeting .sub { font-size: 12px; color: var(--text3); font-weight: 600; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 4px; }
    .hero-greeting .title { font-size: 28px; font-weight: 900; letter-spacing: -0.5px; line-height: 1.1; }
    .hero-greeting .title span { color: var(--accent); }

    .stats-row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 24px; }
    .stat-card {
      background: var(--bg2); border: 1px solid var(--border); border-radius: var(--r-lg);
      padding: 16px 14px; text-align: center; transition: border-color .2s, transform .2s;
    }
    .stat-card:hover { border-color: var(--border-h); transform: translateY(-2px); }
    .stat-num { font-size: 26px; font-weight: 900; line-height: 1; margin-bottom: 4px; font-family: 'DM Mono', monospace; }
    .stat-lbl { font-size: 10px; color: var(--text3); font-weight: 600; text-transform: uppercase; letter-spacing: 0.6px; }

    .section-head { display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px; }
    .section-title { font-size: 16px; font-weight: 800; display: flex; align-items: center; gap: 8px; }
    .count-pill { background: var(--bg3); border: 1px solid var(--border); color: var(--text2); padding: 2px 9px; border-radius: 999px; font-size: 11px; font-weight: 700; }
    .count-pill.bump { animation: badgeBump .35s cubic-bezier(.34,1.56,.64,1); }
    @keyframes badgeBump { 0%{transform:scale(1);} 40%{transform:scale(1.5);} 100%{transform:scale(1);} }
    .sort-tag { font-size: 10px; color: var(--text3); background: var(--bg3); border: 1px solid var(--border); padding: 2px 8px; border-radius: 999px; font-weight: 600; display: flex; align-items: center; gap: 4px; }

    .filter-bar { display: flex; gap: 8px; margin-bottom: 18px; overflow-x: auto; padding-bottom: 4px; scrollbar-width: none; }
    .filter-bar::-webkit-scrollbar { display: none; }
    .filter-chip {
      flex-shrink: 0; padding: 7px 14px; border-radius: 999px; font-size: 12px; font-weight: 700;
      cursor: pointer; border: 1px solid var(--border); background: var(--bg2);
      color: var(--text3); font-family: 'DM Sans', sans-serif; transition: all .18s;
      white-space: nowrap; display: flex; align-items: center; gap: 5px;
    }
    .filter-chip:hover { border-color: var(--border-h); color: var(--text); }
    .filter-chip.active { background: var(--accent); border-color: var(--accent); color: #fff; }

    #notices-list { display: flex; flex-direction: column; gap: 10px; }
    .notice-card {
      background: var(--bg2); border: 1px solid var(--border);
      border-radius: var(--r-lg); padding: 18px; position: relative;
      overflow: hidden; transition: border-color .2s, transform .2s;
      cursor: default;
    }
    .notice-card::after {
      content: ''; position: absolute; left: 0; top: 0; bottom: 0; width: 3px;
      border-radius: 0; opacity: 0; transition: opacity .2s;
    }
    .notice-card:hover { border-color: var(--border-h); transform: translateY(-2px); }
    .notice-card:hover::after { opacity: 1; }
    .notice-card.type-aviso::after { background: var(--yellow); }
    .notice-card.type-prova::after { background: var(--accent); }
    .notice-card.type-trabalho::after { background: var(--green); }
    .notice-card.type-atividade::after { background: var(--blue); }
    .notice-card.card-enter { animation: cardEnter .4s cubic-bezier(.34,1.2,.64,1) both; }
    @keyframes cardEnter { from{opacity:0;transform:translateY(16px);} to{opacity:1;transform:none;} }
    .notice-card.card-exit { animation: cardExit .25s ease forwards; }
    @keyframes cardExit { to{opacity:0;transform:scale(.95);} }

    .notice-top { display: flex; align-items: flex-start; justify-content: space-between; gap: 10px; margin-bottom: 10px; }
    .notice-chips { display: flex; align-items: center; gap: 6px; flex-wrap: wrap; }
    .notice-type-pill {
      display: inline-flex; align-items: center; gap: 4px;
      padding: 3px 9px; border-radius: 6px; font-size: 10px; font-weight: 800;
      letter-spacing: 0.5px; text-transform: uppercase;
    }
    .pill-aviso    { background: rgba(255,165,2,0.15); color: var(--yellow); }
    .pill-prova    { background: rgba(255,71,87,0.15); color: var(--accent); }
    .pill-trabalho { background: rgba(46,213,115,0.12); color: var(--green); }
    .pill-atividade{ background: rgba(59,130,246,0.15); color: var(--blue); }

    .urgency-badge {
      display: inline-flex; align-items: center; gap: 4px;
      padding: 3px 8px; border-radius: 6px; font-size: 10px; font-weight: 800;
      letter-spacing: 0.4px; text-transform: uppercase;
    }
    .urgency-today    { background: rgba(255,71,87,0.18); color: var(--accent); animation: urgPulse 1.5s ease-in-out infinite; }
    .urgency-soon     { background: rgba(255,165,2,0.12); color: var(--yellow); }
    .urgency-upcoming { background: rgba(59,130,246,0.12); color: var(--blue); }
    @keyframes urgPulse { 0%,100%{opacity:1;} 50%{opacity:0.65;} }

    .notice-actions { display: flex; gap: 6px; flex-shrink: 0; }
    .notice-author { font-size: 12px; font-weight: 800; color: var(--text3); text-transform: uppercase; letter-spacing: 0.5px; }
    .notice-time { font-size: 11px; color: var(--text3); }
    .notice-body { font-size: 14px; line-height: 1.65; color: var(--text2); }
    .notice-deadline {
      margin-top: 10px; font-size: 11px; font-weight: 700;
      display: inline-flex; align-items: center; gap: 5px;
      padding: 4px 10px; border: 1px solid var(--border); border-radius: 6px;
      background: var(--bg3); color: var(--text2);
    }
    .notice-deadline.overdue { color: var(--accent); border-color: rgba(255,71,87,.3); background: var(--accent-dim); }

    .activity-marker {
      display: flex; align-items: center; gap: 10px;
      margin-top: 12px; padding: 10px 12px; border-radius: 8px;
      border: 1px solid var(--border); background: var(--bg3);
      font-size: 13px; font-weight: 600; cursor: pointer; transition: all .2s;
    }
    .activity-marker input { width: 16px; height: 16px; accent-color: var(--accent); cursor: pointer; }
    .activity-marker.done { border-color: rgba(46,213,115,.3); background: rgba(46,213,115,.08); color: var(--green); }
    .notice-card.done-activity { border-color: rgba(46,213,115,.25); }

    .empty-state { text-align: center; padding: 48px 20px; color: var(--text3); }
    .empty-state .es-icon { margin: 0 auto 12px; opacity: 0.4; display: flex; justify-content: center; }
    .empty-state p { font-size: 13px; }

    .books-table { width: 100%; border-collapse: collapse; font-size: 13px; }
    .books-table th, .books-table td { padding: 10px 12px; border-bottom: 1px solid var(--border); text-align: left; }
    .books-table th { color: var(--text3); font-size: 10px; text-transform: uppercase; letter-spacing: .08em; font-weight: 700; }
    .books-table tbody tr:hover { background: rgba(255,255,255,.02); }

    .admin-wrap { background: var(--bg2); border: 1px solid var(--border); border-radius: var(--r-xl); padding: 22px; margin-bottom: 22px; }
    .admin-head { display: flex; align-items: center; gap: 8px; margin-bottom: 18px; }
    .admin-head-icon { width: 32px; height: 32px; background: var(--accent-dim); border-radius: 8px; display: flex; align-items: center; justify-content: center; }
    .admin-head h3 { font-size: 14px; font-weight: 800; }

    .admin-tabs { display: flex; background: var(--bg3); border-radius: var(--r); padding: 3px; margin-bottom: 18px; gap: 3px; }
    .admin-tab {
      flex: 1; padding: 8px; border: none; border-radius: 9px; background: transparent;
      color: var(--text3); font-family: 'DM Sans', sans-serif; font-size: 12px; font-weight: 700;
      cursor: pointer; transition: all .2s; display: flex; align-items: center; justify-content: center; gap: 5px;
    }
    .admin-tab.active { background: var(--accent); color: #fff; }

    .admin-form-panel { display: none; }
    .admin-form-panel.active { display: block; animation: panelIn .3s ease both; }

    .type-selector { display: flex; gap: 6px; margin-bottom: 12px; flex-wrap: wrap; }
    .type-chip {
      padding: 6px 12px; border-radius: 8px; font-size: 11px; font-weight: 800;
      cursor: pointer; border: 1px solid var(--border); background: var(--bg3);
      color: var(--text3); font-family: 'DM Sans', sans-serif; transition: all .18s;
      text-transform: uppercase; letter-spacing: 0.4px;
      display: flex; align-items: center; gap: 5px;
    }
    .type-chip:hover { border-color: var(--border-h); color: var(--text); }
    .type-chip.active { background: var(--accent-dim); border-color: var(--accent); color: var(--accent); }

    .publish-actions { display: flex; gap: 8px; margin-top: 12px; }

    .suggestions-wrap { background: var(--bg2); border: 1px solid var(--border); border-radius: var(--r-xl); padding: 18px; margin-bottom: 22px; }
    .suggestions-top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 0; }
    .suggestions-top-left { display: flex; align-items: center; gap: 8px; }
    .suggestions-icon { width: 30px; height: 30px; background: rgba(251,191,36,.12); border-radius: 8px; display: flex; align-items: center; justify-content: center; }
    .suggestions-top h3 { font-size: 13px; font-weight: 800; }
    .notif-badge {
      display: inline-flex; align-items: center; justify-content: center;
      min-width: 20px; height: 20px; padding: 0 5px; border-radius: 999px;
      background: var(--accent); color: #fff; font-size: 10px; font-weight: 800;
      animation: notifPulse 2s ease-in-out infinite;
    }
    @keyframes notifPulse { 0%,100%{transform:scale(1);} 50%{transform:scale(1.1);} }

    .confetti-particle {
      position: fixed; width: 7px; height: 7px; border-radius: 2px;
      pointer-events: none; z-index: 9999;
      animation: confettiFly var(--dur,1s) var(--delay,0s) cubic-bezier(.23,1,.32,1) both;
    }
    @keyframes confettiFly {
      0%{transform:translate(0,0) rotate(0deg);opacity:1;}
      80%{opacity:1;}
      100%{transform:translate(var(--tx,0px),var(--ty,120px)) rotate(var(--rot,360deg));opacity:0;}
    }

    .done-banner {
      position: fixed; top: 50%; left: 50%;
      display: flex; align-items: center; gap: 8px;
      padding: 12px 24px; background: var(--green); color: #000;
      font-size: 15px; font-weight: 900; border-radius: 12px;
      box-shadow: 0 12px 40px rgba(46,213,115,.35);
      z-index: 9999; pointer-events: none;
      animation: doneBanner .5s cubic-bezier(.34,1.56,.64,1) both;
    }
    @keyframes doneBanner {
      0%{opacity:0;transform:translate(-50%,-50%) scale(.7);}
      100%{opacity:1;transform:translate(-50%,-50%) scale(1);}
    }

    .skeleton { background: linear-gradient(90deg,var(--bg3) 25%,var(--bg4) 50%,var(--bg3) 75%); background-size:200% 100%; animation:shimmer 1.4s infinite; border-radius:8px; }
    @keyframes shimmer { from{background-position:200% 0;} to{background-position:-200% 0;} }
    @keyframes shake { 0%,100%{transform:translateX(0);} 20%{transform:translateX(-8px);} 40%{transform:translateX(8px);} 60%{transform:translateX(-4px);} 80%{transform:translateX(4px);} }
    @keyframes authOut { to{opacity:0;transform:scale(.96) translateY(-8px);} }

    @media(max-width:480px){
      .stats-row{grid-template-columns:repeat(3,1fr);}
      .publish-actions{flex-direction:column;}
      .notice-actions .btn-sm span{display:none;}
    }
  </style>
</head>
<body>

<canvas id="bg-canvas"></canvas>
<div id="toast"></div>

<!-- SVG icon definitions (hidden, referenced by <use>) -->
<svg xmlns="http://www.w3.org/2000/svg" style="display:none">
  <!-- lock -->
  <symbol id="ic-lock" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
    <rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/>
  </symbol>
  <!-- layout / board -->
  <symbol id="ic-layout" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
    <rect x="3" y="3" width="18" height="18" rx="2"/><path d="M3 9h18M9 21V9"/>
  </symbol>
  <!-- megaphone / aviso -->
  <symbol id="ic-megaphone" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
    <path d="M3 11l19-9-9 19-2-8-8-2z"/>
  </symbol>

<script>
  /* ══ SVG icon helper — returns inline SVG string ══ */
  function icon(id, size=13, color='currentColor') {
    return `<svg width="${size}" height="${size}" style="color:${color};flex-shrink:0" aria-hidden="true"><use href="#${id}"/></svg>`;
  }

  /* ══ SUPABASE ══ */
  const SUPABASE_URL = "https://bxjgdwnhsukpleopampe.supabase.co";
  const SUPABASE_ANON = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJ4amdkd25oc3VrcGxlb3BhbXBlIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk0MTAwMTUsImV4cCI6MjA5NDk4NjAxNX0.bDnYSVl1oqyaOgakR2Fkq6diMwxx-6PMfqQSutFf-34";
  const SB_HEADERS = {
    "Content-Type": "application/json",
    "apikey": SUPABASE_ANON,
    "Authorization": `Bearer ${SUPABASE_ANON}`,
    "Prefer": "return=representation"
  };

  async function sbFetch(path, options = {}) {
    const res = await fetch(`${SUPABASE_URL}/rest/v1/${path}`, {
      ...options, headers: { ...SB_HEADERS, ...(options.headers || {}) }
    });
    if (!res.ok) {
      const t = await res.text(); let m = `Erro ${res.status}`;
      try { m = JSON.parse(t).message || m; } catch {}
      throw new Error(m);
    }
    const text = await res.text();
    if (!text) return null;
    try { return JSON.parse(text); } catch { return text; }
  }

  const DB = {
    async findUser(name) { const r = await sbFetch(`users?name=ilike.${encodeURIComponent(name)}&limit=1`); return r[0]||null; },
    async createUser(name, pass) { const r = await sbFetch("users",{method:"POST",body:JSON.stringify({name,pass})}); return r[0]; },
    async getNotices() { return sbFetch("notices?order=created_at.desc"); },
    async createNotice(text,type,author,dueDate=null) { const r = await sbFetch("notices",{method:"POST",body:JSON.stringify({text,type,author,due_date:dueDate||null})}); return r[0]; },
    async updateNotice(id,text) { const r = await sbFetch(`notices?id=eq.${id}`,{method:"PATCH",body:JSON.stringify({text,edited:true})}); return r[0]; },
    async deleteNotice(id) { return sbFetch(`notices?id=eq.${id}`,{method:"DELETE"}); },
    async getBooks() { return sbFetch("books"); },
    async createBook(day,subject,bookName) { const r = await sbFetch("books",{method:"POST",body:JSON.stringify({day_of_week:day,subject,book_name:bookName})}); return r[0]; },
    async deleteBook(id) { return sbFetch(`books?id=eq.${id}`,{method:"DELETE"}); },
    async getSuggestions() { return sbFetch("suggestions?order=created_at.desc"); },
    async createSuggestion(message,author) { const r = await sbFetch("suggestions",{method:"POST",body:JSON.stringify({message,author})}); return r[0]; },
    async deleteSuggestion(id) { return sbFetch(`suggestions?id=eq.${id}`,{method:"DELETE"}); },
    async markCompletion(noticeId, userName) {
      await sbFetch("activity_completions?on_conflict=notice_id,user_name", {
        method: "POST",
        headers: { "Prefer": "resolution=ignore-duplicates,return=minimal" },
        body: JSON.stringify({ notice_id: String(noticeId), user_name: userName })
      });
    },
    async unmarkCompletion(noticeId, userName) {
      await sbFetch(`activity_completions?notice_id=eq.${noticeId}&user_name=ilike.${encodeURIComponent(userName)}`, { method: "DELETE" });
    },
    getSession() { return JSON.parse(localStorage.getItem("tc_session")||"null"); },
    saveSession(u) { localStorage.setItem("tc_session",JSON.stringify(u)); },
    clearSession() { localStorage.removeItem("tc_session"); }
  };

  const ADMIN_USERS = ["representante","admin","monitor","delegado"];
  let currentUser=null, notices=[], books=[], suggestions=[];
  let currentFilter="todos", editingId=null, selectedType="aviso";

  const REFRESH_INTERVAL_MS = 60*60*1000;
  let refreshTimer = null;
  function startAutoRefresh() { stopAutoRefresh(); refreshTimer = setTimeout(silentRefresh, REFRESH_INTERVAL_MS); }
  function stopAutoRefresh() { if(refreshTimer){ clearTimeout(refreshTimer); refreshTimer=null; } }
  async function silentRefresh() {
    try {
      [notices, books, suggestions] = await Promise.all([DB.getNotices(), DB.getBooks(), DB.getSuggestions()]);
      renderNotices(false); renderBooks(); renderSuggestions(); updateNotificationBadge(); updateStats();
      toast("Atualizado", "ic-refresh");
    } catch(e) { console.warn("Auto-refresh failed:", e); }
    startAutoRefresh();
  }

  const PRIORITY_TYPES = new Set(['prova','trabalho','atividade']);
  const FAR_FUTURE = '9999-99-99';

  function sortNotices(list) {
    const today = getTodayIso();
    return [...list].sort((a,b) => {
      const ap = PRIORITY_TYPES.has(a.type), bp = PRIORITY_TYPES.has(b.type);
      if(ap !== bp) return ap ? -1 : 1;
      if(ap && bp) {
        const ad = normalizeDateIso(a.due_date)||FAR_FUTURE, bd = normalizeDateIso(b.due_date)||FAR_FUTURE;
        const ao = ad<today, bo = bd<today;
        if(ao !== bo) return ao ? 1 : -1;
        if(ad !== bd) return ad.localeCompare(bd);
        return new Date(b.created_at)-new Date(a.created_at);
      }
      return new Date(b.created_at)-new Date(a.created_at);
    });
  }

  function getUrgencyBadge(dueDateIso) {
    if(!dueDateIso) return '';
    const today = getTodayIso();
    const diff = daysUntil(dueDateIso, today);
    if(diff < 0) return '';
    if(diff === 0) return `<span class="urgency-badge urgency-today">${icon('ic-flame',10,'currentColor')} Hoje</span>`;
    if(diff <= 3) return `<span class="urgency-badge urgency-soon">${icon('ic-timer',10,'currentColor')} ${diff}d</span>`;
    if(diff <= 7) return `<span class="urgency-badge urgency-upcoming">${icon('ic-calendar',10,'currentColor')} ${diff}d</span>`;
    return '';
  }
  function daysUntil(isoTarget, isoToday) {
    return Math.round((new Date(isoTarget+'T00:00:00')-new Date(isoToday+'T00:00:00'))/86400000);
  }

  window.addEventListener("DOMContentLoaded", () => {
    const s = DB.getSession(); if(s) loginUser(s.name);
    ["login-name","login-pass"].forEach(id=>document.getElementById(id).addEventListener("keydown",e=>{if(e.key==="Enter")doLogin();}));
    ["reg-name","reg-pass","reg-pass2"].forEach(id=>document.getElementById(id).addEventListener("keydown",e=>{if(e.key==="Enter")doRegister();}));
    toggleDeadlineInput();
  });

    document.querySelectorAll(".auth-tab").forEach((el,i)=>el.classList.toggle("active",(i===0)===(tab==="login")));
    document.getElementById("tab-login").classList.toggle("active",tab==="login");
    document.getElementById("tab-register").classList.toggle("active",tab!=="login");
  }
  function shakeCard() {
    const c = document.querySelector(".auth-card");
    c.style.animation="none"; c.offsetHeight; c.style.animation="shake .4s ease";
    c.addEventListener("animationend",()=>c.style.animation="",{once:true});
  }

  async function doRegister() {
    const name=document.getElementById("reg-name").value.trim();
    const pass=document.getElementById("reg-pass").value;
    const pass2=document.getElementById("reg-pass2").value;
    if(!name){shakeCard();return toast("Digite um nome.");}
    if(name.length<2){shakeCard();return toast("Nome muito curto.");}
    if(pass.length<4){shakeCard();return toast("Senha com ao menos 4 caracteres.");}
    if(pass!==pass2){shakeCard();return toast("As senhas não conferem.");}
    setBtnLoading("reg-btn",true,"Criando...");
    try {
      const existing = await DB.findUser(name);
      if(existing){shakeCard();return toast("Esse nome já está em uso.");}
      await DB.createUser(name,pass);
      toast("Conta criada! Faça login."); switchTab("login");
      document.getElementById("login-name").value=name;
    } catch(e){shakeCard();toast("Erro: "+e.message);}
    finally{setBtnLoading("reg-btn",false,"Criar conta");}
  }

  async function doLogin() {
    const name=document.getElementById("login-name").value.trim();
    const pass=document.getElementById("login-pass").value;
    if(!name||!pass){shakeCard();return toast("Preencha todos os campos.");}
    setBtnLoading("login-btn",true,"Entrando...");
    try {
      const user=await DB.findUser(name);
      if(!user||user.pass!==pass){shakeCard();return toast("Nome ou senha incorretos.");}
      loginUser(user.name);
    } catch(e){shakeCard();toast("Erro de conexão: "+e.message);}
    finally{setBtnLoading("login-btn",false,"Entrar");}
  }

  function loginUser(name) {
    const isAdmin = ADMIN_USERS.some(a=>a.toLowerCase()===name.toLowerCase());
    currentUser={name,isAdmin}; DB.saveSession(currentUser);
    document.getElementById("dash-name").textContent=name;
    document.getElementById("hero-name").textContent=name.split(" ")[0];
    document.getElementById("dash-role").textContent=isAdmin?"Representante (Admin)":"Aluno";
    document.getElementById("dash-avatar").textContent=name[0].toUpperCase();
    document.getElementById("admin-panel").classList.toggle("hidden",!isAdmin);
    document.getElementById("suggestions-header-panel").classList.remove("hidden");
    const auth=document.getElementById("page-auth"), dash=document.getElementById("page-dashboard");
    auth.style.animation="authOut .3s ease forwards";
    auth.addEventListener("animationend",()=>{
      auth.classList.add("hidden"); auth.style.animation="";

  function doLogout() {
    stopAutoRefresh();

    dash.style.animation="authOut .3s ease forwards";

  async function publishNotice() {
    if(!currentUser?.isAdmin) return;
    const text=document.getElementById("pub-text").value.trim();

    if(!text) return toast("Escreva algo antes de publicar.");
    if(requiresDeadline(selectedType)&&!dueDate) return toast("Informe a data de término.");
    setBtnLoading("pub-btn",true,"Publicando...");
    try {
      const notice=await DB.createNotice(text,selectedType,currentUser.name,requiresDeadline(selectedType)?dueDate:null);
      notices.unshift(notice); renderNotices(true); clearPublish(); toast("Publicado!"); bumpCount(); updateStats();

  async function deleteBook(id) {
    if(!confirm("Excluir este livro?")) return;
    try { await DB.deleteBook(id); books=books.filter(b=>b.id!==id); renderBooks(); if(currentFilter==="livros")renderNotices(false); toast("Livro excluído."); }

  function renderBooks() {
    const list=document.getElementById("current-books");
    const days=["segunda","terça","quarta","quinta","sexta","sábado","domingo"];
    if(!books.length){list.innerHTML=`<div class="empty-state" style="padding:24px 0"><div class="es-icon">${icon('ic-book',30,'var(--text3)')}</div><p>Nenhum livro.</p></div>`;return;}
    const rows=books.slice().sort((a,b)=>{const d=days.indexOf(a.day_of_week)-days.indexOf(b.day_of_week);return d||a.subject.localeCompare(b.subject,'pt-BR');})

    list.innerHTML=`<div style="overflow-x:auto;margin-top:14px"><table class="books-table"><thead><tr><th>Dia</th><th>Matéria</th><th>Livro</th><th></th></tr></thead><tbody>${rows}</tbody></table></div>`;
  }

  function getDoneActivities(){if(!currentUser)return{};try{return JSON.parse(localStorage.getItem(`tc_done_activities_${currentUser.name.toLowerCase()}`)||"{}")||{};}catch(e){return{};}}
  function saveDoneActivities(m){if(!currentUser)return;localStorage.setItem(`tc_done_activities_${currentUser.name.toLowerCase()}`,JSON.stringify(m));}
  function isActivityDone(id){return!!getDoneActivities()[id];}

  function launchConfetti(originX,originY){
    const colors=['#ff4757','#ff6b81','#2ed573','#ffa502','#3b82f6','#a78bfa','#fbbf24','#34d399'];
    for(let i=0;i<42;i++){
      const el=document.createElement('div');el.className='confetti-particle';
      const angle=(360/42)*i+Math.random()*15;
      const dist=70+Math.random()*100;
      const rad=angle*Math.PI/180;
      const tx=Math.cos(rad)*dist,ty=Math.sin(rad)*dist-30;
      const dur=(0.6+Math.random()*0.5).toFixed(2);
      const delay=(Math.random()*0.1).toFixed(2);
      const rot=(Math.random()*720-360).toFixed(0);
      const size=(4+Math.random()*6).toFixed(0);
      el.style.cssText=`left:${originX}px;top:${originY}px;width:${size}px;height:${size}px;background:${colors[Math.floor(Math.random()*colors.length)]};--tx:${tx}px;--ty:${ty}px;--dur:${dur}s;--delay:${delay}s;--rot:${rot}deg;border-radius:${Math.random()>.5?'50%':'2px'};`;
      document.body.appendChild(el);el.addEventListener('animationend',()=>el.remove());
    }
  }

  function showDoneBanner(){
    const b=document.createElement("div");b.className="done-banner";
    b.innerHTML=`${icon('ic-check-circle',18,'#000')}<span>Parabéns!</span>`;
    document.body.appendChild(b);
    setTimeout(()=>{b.style.opacity="0";b.style.transform="translate(-50%,-50%) scale(.9)";b.style.transition="all .3s ease";},2000);
    setTimeout(()=>b.remove(),2400);
  }

  async function toggleActivityDone(id,checkboxEl){
    const m=getDoneActivities();
    const nowDone=!m[id];
    m[id]=nowDone; saveDoneActivities(m);
    if(nowDone){
      const rect=checkboxEl?checkboxEl.getBoundingClientRect():{left:window.innerWidth/2,top:window.innerHeight/2};
      launchConfetti(rect.left+rect.width/2,rect.top+rect.height/2);
      showDoneBanner();
      try{await DB.markCompletion(id,currentUser.name);}
      catch(e){console.error(e);toast('Erro ao salvar conclusão.');m[id]=false;saveDoneActivities(m);}
    }else{
      try{await DB.unmarkCompletion(id,currentUser.name);}
      catch(e){console.error(e);toast('Erro ao desmarcar.');m[id]=true;saveDoneActivities(m);}
    }
    renderNotices(false);
  }

    setBtnLoading("suggest-btn",true,"Enviando...");

  function renderSuggestions(){
    const list=document.getElementById("suggestions-list");
    const visible=suggestions.filter(s=>currentUser?.isAdmin||s.author===currentUser?.name);
    if(!visible.length){list.innerHTML=`<div style="text-align:center;color:var(--text3);padding:14px;font-size:12px">Nenhuma sugestão ainda</div>`;return;}
    list.innerHTML=visible.map(s=>{
      const rel=relativeTime(new Date(s.created_at));
      const canDelete=currentUser?.isAdmin||s.author===currentUser?.name;
      const delBtn=canDelete?`<button class="btn btn-danger btn-sm" onclick="deleteSuggestion(${s.id})">${icon('ic-x',11,'currentColor')}</button>`:"";
      return `<div style="background:var(--bg3);border:1px solid var(--border);border-radius:10px;padding:12px;margin-bottom:8px">
        <div style="display:flex;justify-content:space-between;align-items:start;margin-bottom:8px">
          <div><div style="font-size:12px;font-weight:800;color:var(--text2)">${esc(s.author)}</div><div style="font-size:10px;color:var(--text3)">${rel}</div></div>${delBtn}
        </div>
        <div style="font-size:13px;line-height:1.5;color:var(--text)">${esc(s.message).replace(/\n/g,"<br>")}</div>

    if(suggestions.length>0){badge.classList.remove("hidden");badge.textContent=suggestions.length>99?"99+":suggestions.length;}

    content.style.display=isHidden?"block":"none";

  const TYPE_CONFIG={
    aviso:    {iconId:"ic-megaphone", label:"Aviso",     pill:"pill-aviso",    color:"var(--yellow)"},
    prova:    {iconId:"ic-file-text", label:"Prova",     pill:"pill-prova",    color:"var(--accent)"},
    trabalho: {iconId:"ic-folder",    label:"Trabalho",  pill:"pill-trabalho", color:"var(--green)"},
    atividade:{iconId:"ic-book-open", label:"Atividade", pill:"pill-atividade",color:"var(--blue)"},
  };

  function renderNotices(animate){
    const list=document.getElementById("notices-list");

    if(currentFilter==="livros"){
      document.getElementById("notices-count").textContent=books.length;
      document.getElementById("sort-label").innerHTML=`${icon('ic-book',10,'currentColor')} Livros`;
      if(!books.length){list.innerHTML=`<div class="empty-state"><div class="es-icon">${icon('ic-book',36,'var(--text3)')}</div><p>Nenhum livro necessário.</p></div>`;return;}
      const days=["segunda","terça","quarta","quinta","sexta","sábado","domingo"];
      const grouped={}; days.forEach(d=>grouped[d]=[]); books.forEach(b=>{if(grouped[b.day_of_week])grouped[b.day_of_week].push(b);});
      Object.keys(grouped).forEach(day=>{grouped[day].sort((a,b)=>a.subject.localeCompare(b.subject,'pt-BR'));});
      list.innerHTML=days.filter(day=>grouped[day].length>0).map(day=>`
        <div class="notice-card" style="padding:18px">
          <div style="font-size:13px;font-weight:800;color:var(--text2);margin-bottom:12px;text-transform:uppercase;letter-spacing:0.5px;display:flex;align-items:center;gap:6px">
            ${icon('ic-calendar',13,'var(--text3)')} ${capitalizeDay(day)}
          </div>
          ${grouped[day].map(b=>`<div style="padding:8px 0;font-size:13px;border-bottom:1px solid var(--border);display:flex;gap:12px">
            <span style="color:var(--accent);font-weight:700;min-width:80px">${esc(b.subject)}</span>
            <span style="color:var(--text2)">${esc(b.book_name)}</span></div>`).join("")}
        </div>`).join("");
      return;
    }

    const raw=currentFilter==="todos"?notices:notices.filter(n=>n.type===currentFilter);
    const filtered=sortNotices(raw);
    const hasPriority=filtered.some(n=>PRIORITY_TYPES.has(n.type));

    document.getElementById("notices-count").textContent=filtered.length;
    document.getElementById("sort-label").innerHTML=hasPriority
      ? `${icon('ic-arrow-up',10,'currentColor')} Por urgência`
      : `${icon('ic-clock',10,'currentColor')} Recentes`;

    if(!filtered.length){list.innerHTML=`<div class="empty-state"><div class="es-icon">${icon('ic-inbox',36,'var(--text3)')}</div><p>Nenhuma publicação aqui.</p></div>`;return;}

    list.innerHTML=filtered.map((n,i)=>{
      const cfg=TYPE_CONFIG[n.type]||TYPE_CONFIG.aviso;
      const rel=relativeTime(new Date(n.created_at));
      const dueDateIso=normalizeDateIso(n.due_date);
      const deadlineInfo=dueDateIso?`<div class="notice-deadline ${isPastDue(dueDateIso)?"overdue":""}">${icon('ic-timer',11,'currentColor')} Término: ${formatDatePtBr(dueDateIso)}</div>`:"";
      const urgencyBadge=PRIORITY_TYPES.has(n.type)?getUrgencyBadge(dueDateIso):"";
      const delay=animate?`animation-delay:${i*.06}s`:"animation:none";
      const admin=currentUser?.isAdmin
        ? `<button class="btn btn-ghost btn-sm" onclick="openEdit('${n.id}')">${icon('ic-pencil',12,'currentColor')} <span>Editar</span></button><button class="btn btn-danger btn-sm" onclick="deleteNotice('${n.id}')">${icon('ic-trash',12,'currentColor')} <span>Excluir</span></button>`
        : "";
      const done=n.type==="atividade"&&isActivityDone(n.id);
      const donePill=done?`<span class="notice-type-pill" style="background:rgba(46,213,115,.12);color:var(--green)">${icon('ic-check-circle',10,'currentColor')} Feita</span>`:"";
      const activityToggle=n.type==="atividade"?`<label class="activity-marker ${done?"done":""}"><input type="checkbox" ${done?"checked":""} onchange="toggleActivityDone('${n.id}',this)"/><span>${done?"Atividade concluída":"Marcar como concluída"}</span></label>`:"";

      return `<div class="notice-card type-${n.type} card-enter ${done?"done-activity":""}" data-id="${n.id}" style="${delay}">
        <div class="notice-top">
          <div>
            <div class="notice-chips">
              <span class="notice-type-pill ${cfg.pill}">${icon(cfg.iconId,10,cfg.color)} ${cfg.label}</span>
              ${donePill}${urgencyBadge}
            </div>
            <div style="display:flex;align-items:center;gap:6px;margin-top:7px">
              <span class="notice-author">${esc(n.author)}</span>
              <span style="color:var(--text3);font-size:11px">·</span>
              <span class="notice-time">${rel}</span>
              ${n.edited?`<span style="font-size:10px;color:var(--text3)">(editado)</span>`:""}
            </div>
          </div>
          <div class="notice-actions">${admin}</div>
        </div>
        <div class="notice-body">${esc(n.text).replace(/\n/g,"<br>")}</div>
        ${deadlineInfo}${activityToggle}
      </div>`;
    }).join("");
  }

  function esc(s){return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");}
  function capitalizeDay(day){return day.charAt(0).toUpperCase()+day.slice(1);}
  function relativeTime(d){const diff=Date.now()-d.getTime(),m=Math.floor(diff/60000),h=Math.floor(m/60),dy=Math.floor(h/24);if(m<1)return"agora";if(m<60)return`${m}min`;if(h<24)return`${h}h`;if(dy<7)return`${dy}d`;return d.toLocaleDateString("pt-BR");}
  function normalizeDateIso(value){if(!value||typeof value!=="string")return"";const iso=value.slice(0,10);return/^\d{4}-\d{2}-\d{2}$/.test(iso)?iso:"";}
  function formatDatePtBr(isoDate){const[y,m,d]=isoDate.split("-");return`${d}/${m}/${y}`;}
  function getTodayIso(){const n=new Date();return`${n.getFullYear()}-${String(n.getMonth()+1).padStart(2,"0")}-${String(n.getDate()).padStart(2,"0")}`;}
  function isPastDue(isoDate){return isoDate<getTodayIso();}

  let toastTimer;
  function toast(msg, iconId=null){
    const el=document.getElementById("toast");
    el.innerHTML = (iconId ? icon(iconId,13,'currentColor')+'&nbsp;' : '') + esc(msg);
    el.classList.add("show");
    clearTimeout(toastTimer);
    toastTimer=setTimeout(()=>el.classList.remove("show"),3000);
  }
  function setBtnLoading(id,loading,label){const btn=document.getElementById(id);if(!btn)return;btn.disabled=loading;btn.textContent=label;btn.style.opacity=loading?".65":"1";}

  document.getElementById("edit-modal").addEventListener("click",function(e){if(e.target===this)closeModal();});
</script>

<!-- ══ ANIMATED BACKGROUND ══ -->
<script>
(function(){
  const canvas = document.getElementById('bg-canvas');
  const ctx = canvas.getContext('2d');
  let W, H, animId;
  const ACCENT = [255, 71, 87];
  const BLUE   = [59, 130, 246];
  const DIM    = [30, 30, 35];

  const orbs = [
    { x: 0.15, y: 0.1,  r: 0.38, color: ACCENT, phase: 0,    speed: 0.0004 },
    { x: 0.85, y: 0.25, r: 0.30, color: BLUE,   phase: 2.1,  speed: 0.0003 },
    { x: 0.5,  y: 0.8,  r: 0.35, color: ACCENT, phase: 4.4,  speed: 0.00035 },
    { x: 0.75, y: 0.75, r: 0.22, color: BLUE,   phase: 1.2,  speed: 0.0005 },
    { x: 0.25, y: 0.6,  r: 0.20, color: DIM,    phase: 3.3,  speed: 0.00025 },
  ];

  const PARTICLE_COUNT = 55;
  const particles = [];

  function initParticles() {
    particles.length = 0;
    for (let i = 0; i < PARTICLE_COUNT; i++) particles.push(newParticle(true));
  }

  function newParticle(randomY = false) {
    const isAccent = Math.random() > 0.5;
    return {
      x: Math.random() * W,
      y: randomY ? Math.random() * H : H + 10,
      r: Math.random() * 1.8 + 0.4,
      vx: (Math.random() - 0.5) * 0.3,
      vy: -(Math.random() * 0.5 + 0.2),
      alpha: Math.random() * 0.5 + 0.1,
      color: isAccent ? ACCENT : BLUE,
      life: 0,
      maxLife: Math.random() * 400 + 200,
    };
  }

  function drawGrid() {
    const spacing = 80;
    ctx.save();
    ctx.strokeStyle = 'rgba(255,255,255,0.025)';
    ctx.lineWidth = 1;
    for (let x = 0; x < W; x += spacing) { ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, H); ctx.stroke(); }
    for (let y = 0; y < H; y += spacing) { ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(W, y); ctx.stroke(); }
    ctx.restore();
  }

  function resize() {
    W = canvas.width  = window.innerWidth;
    H = canvas.height = window.innerHeight;
    initParticles();
  }

  let t = 0;
  function draw() {
    t++;
    ctx.clearRect(0, 0, W, H);
    ctx.fillStyle = '#0e0e0f';
    ctx.fillRect(0, 0, W, H);
    drawGrid();

    orbs.forEach(o => {
      o.phase += o.speed;
      const ox = o.x * W + Math.sin(o.phase * 1.3) * W * 0.06;
      const oy = o.y * H + Math.cos(o.phase)       * H * 0.07;
      const rPx = o.r * Math.min(W, H);
      const g = ctx.createRadialGradient(ox, oy, 0, ox, oy, rPx);
      const [r, gv, b] = o.color;
      g.addColorStop(0,   `rgba(${r},${gv},${b},0.13)`);
      g.addColorStop(0.5, `rgba(${r},${gv},${b},0.05)`);
      g.addColorStop(1,   `rgba(${r},${gv},${b},0)`);
      ctx.beginPath(); ctx.arc(ox, oy, rPx, 0, Math.PI * 2);
      ctx.fillStyle = g; ctx.fill();
    });

    for (let i = particles.length - 1; i >= 0; i--) {
      const p = particles[i];
      p.x += p.vx; p.y += p.vy; p.life++;
      const fade = p.life < 40 ? p.life / 40 : p.life > p.maxLife - 40 ? (p.maxLife - p.life) / 40 : 1;
      const [r, gv, b] = p.color;
      ctx.beginPath(); ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
      ctx.fillStyle = `rgba(${r},${gv},${b},${p.alpha * fade})`; ctx.fill();
      if (p.life >= p.maxLife || p.y < -10) particles[i] = newParticle();
    }

    const vig = ctx.createRadialGradient(W/2, H/2, H*0.2, W/2, H/2, H*0.85);
    vig.addColorStop(0, 'rgba(0,0,0,0)');
    vig.addColorStop(1, 'rgba(0,0,0,0.55)');
    ctx.fillStyle = vig; ctx.fillRect(0, 0, W, H);

    animId = requestAnimationFrame(draw);
  }

  window.addEventListener('resize', resize);
  resize();
  draw();
})();
</script>
